<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>대강당 출결 스캐너 · LG Electronics</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --lg-red: #A50034;
    --green: #00825A;
    --bg: #f2f2f7;
    --surface: #ffffff;
    --surface2: #f2f2f7;
    --border: #e0e0e5;
    --text: #1c1c1e;
    --text2: #6c6c70;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
  }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-text-size-adjust: 100%;
  }
  body { display: flex; flex-direction: column; }

  /* ── 헤더 ── */
  .header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 var(--border);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .lg-mark {
    width: 40px; height: 40px; background: var(--lg-red); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 700; color: white; flex-shrink: 0;
  }
  .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .header-sub   { font-size: 13px; color: var(--text2); margin-top: 1px; }

  .cam-status { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text2); }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%; background: #ccc; transition: background 0.3s;
  }
  .status-dot.active {
    background: var(--green);
    box-shadow: 0 0 0 3px rgba(0,130,90,0.18);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(0,130,90,0.18); }
    50%      { box-shadow: 0 0 0 6px rgba(0,130,90,0.07); }
  }

  /* ── 세로 레이아웃: 카메라 위, 패널 아래 ── */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-height: 0; }

  /* ── 카메라 (상단 60%) ── */
  .scanner-area {
    flex: 0 0 60%; position: relative; overflow: hidden; background: #1a1a1a;
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .scan-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .scan-frame-wrap { position: relative; }
  .scan-frame {
    width: min(55vw, 55vh, 320px); height: min(55vw, 55vh, 320px);
    position: relative;
  }
  .scan-frame::before, .scan-frame::after,
  .scan-frame-inner::before, .scan-frame-inner::after {
    content: ''; position: absolute; width: 40px; height: 40px;
    border-color: white; border-style: solid;
  }
  .scan-frame::before       { top:0; left:0;  border-width:4px 0 0 4px; border-radius:6px 0 0 0; }
  .scan-frame::after        { top:0; right:0; border-width:4px 4px 0 0; border-radius:0 6px 0 0; }
  .scan-frame-inner::before { bottom:0; left:0;  border-width:0 0 4px 4px; border-radius:0 0 0 6px; }
  .scan-frame-inner::after  { bottom:0; right:0; border-width:0 4px 4px 0; border-radius:0 0 6px 0; }
  .scan-line {
    position: absolute; left: 6px; right: 6px; height: 3px;
    background: linear-gradient(90deg, transparent, var(--lg-red), transparent);
    animation: scanAnim 2.2s ease-in-out infinite; top: 6px;
  }
  @keyframes scanAnim {
    0%  { top: 8px; opacity: 1; }
    47% { top: calc(100% - 8px); opacity: 1; }
    50% { opacity: 0; top: 8px; }
    53% { opacity: 1; }
    100%{ top: 8px; opacity: 1; }
  }
  .scan-label {
    position: absolute; bottom: -44px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(6px);
    color: rgba(255,255,255,0.92);
    font-size: 15px; font-weight: 600;
    padding: 9px 20px; border-radius: 30px;
  }

  .flash-overlay {
    position: absolute; inset: 0; background: white;
    opacity: 0; pointer-events: none; transition: opacity 0.05s;
  }
  .flash-overlay.flash { opacity: 0.6; }

  /* 카메라 권한 안내 */
  .cam-prompt {
    position: absolute; inset: 0; background: #1a1a1a;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; padding: 40px;
  }
  .cam-prompt.hidden { display: none; }
  .cam-prompt-icon  { font-size: 52px; }
  .cam-prompt-title { font-size: 22px; font-weight: 700; color: white; text-align: center; }
  .cam-prompt-sub   { font-size: 16px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.8; }
  .cam-btn {
    margin-top: 8px; padding: 18px 48px;
    background: var(--lg-red); color: white; border: none;
    border-radius: 16px; font-size: 18px; font-weight: 700;
    cursor: pointer; box-shadow: 0 4px 20px rgba(165,0,52,0.4);
  }
  .cam-btn:active { opacity: 0.85; }

  /* ── 하단 패널 (40%) ── */
  .side-panel {
    flex: 0 0 40%; display: flex; flex-direction: column;
    background: var(--surface); border-top: 1px solid var(--border);
    overflow: hidden; min-height: 0;
  }

  /* 통계 + 사번입력 상단 영역 */
  .panel-top {
    flex-shrink: 0; display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
  }

  /* 출결 완료 통계 (좌) */
  .stat-big {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 16px 24px; gap: 2px;
    border-right: 1px solid var(--border);
    min-width: 110px;
  }
  .stat-big-num  { font-size: 44px; font-weight: 800; color: var(--green); line-height: 1; }
  .stat-big-desc { font-size: 13px; color: var(--text2); font-weight: 600; margin-top: 4px; }

  /* 사번 직접 입력 (우) */
  .manual-input-area {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 14px 20px; gap: 10px;
  }
  .manual-label { font-size: 13px; font-weight: 600; color: var(--text2); }
  .manual-row   { display: flex; gap: 8px; }
  .manual-input {
    flex: 1; height: 52px;
    border: 1.5px solid var(--border); border-radius: 12px;
    padding: 0 16px; font-size: 20px; font-weight: 600;
    color: var(--text); background: var(--bg); outline: none;
    -webkit-appearance: none;
    transition: border-color 0.15s;
    letter-spacing: 1px;
  }
  .manual-input:focus { border-color: var(--lg-red); background: white; }
  .manual-input::placeholder { font-size: 16px; font-weight: 400; letter-spacing: 0; color: #bbb; }
  .manual-btn {
    height: 52px; padding: 0 22px;
    background: var(--lg-red); color: white; border: none;
    border-radius: 12px; font-size: 17px; font-weight: 700;
    cursor: pointer; flex-shrink: 0;
    transition: opacity 0.15s;
    box-shadow: 0 2px 10px rgba(165,0,52,0.25);
  }
  .manual-btn:active { opacity: 0.8; }

  /* 출결 목록 */
  .result-list {
    flex: 1; overflow-y: auto; padding: 4px 0;
  }
  .result-list::-webkit-scrollbar { width: 4px; }
  .result-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .result-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border);
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .result-item.success  .ri-icon { background: #e6f5ef; color: var(--green); }
  .result-item.error    .ri-icon { background: #fdecea; color: #C0392B; }

  .ri-icon {
    width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .ri-info { flex: 1; min-width: 0; }
  .ri-name { font-size: 17px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ri-sub  { font-size: 13px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ri-time { font-size: 15px; font-weight: 600; color: var(--text2); flex-shrink: 0; }

  .result-empty {
    padding: 32px 20px; text-align: center;
    font-size: 15px; color: var(--text2); line-height: 2;
  }

  /* ── 피드백 바 ── */
  .feedback-bar {
    flex-shrink: 0; min-height: 72px;
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; border-top: 1px solid var(--border);
    transition: background 0.25s;
  }
  .feedback-bar.idle    { background: var(--surface2); }
  .feedback-bar.success { background: #e6f5ef; }
  .feedback-bar.err     { background: #fdecea; }
  .fb-icon { font-size: 28px; flex-shrink: 0; }
  .fb-text { font-size: 20px; font-weight: 700; }
  .fb-sub  { font-size: 14px; margin-top: 2px; }
  .feedback-bar.idle    .fb-text, .feedback-bar.idle    .fb-sub  { color: var(--text2); }
  .feedback-bar.success .fb-text { color: var(--green); }
  .feedback-bar.success .fb-sub  { color: #2d8a5e; }
  .feedback-bar.err     .fb-text { color: #C0392B; }
  .feedback-bar.err     .fb-sub  { color: #a93226; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="lg-mark">LG</div>
    <div>
      <div class="header-title">대강당 출결 스캐너</div>
      <div class="header-sub">LG Electronics 러닝센터</div>
    </div>
  </div>
  <div class="cam-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">준비 중</span>
  </div>
</div>

<div class="main">

  <!-- 상단: 카메라 -->
  <div class="scanner-area">
    <video id="video" playsinline autoplay muted></video>
    <div class="scan-overlay">
      <div class="scan-frame-wrap">
        <div class="scan-frame">
          <div class="scan-frame-inner"></div>
          <div class="scan-line"></div>
        </div>
        <div class="scan-label">QR코드를 네모 안에 맞춰 주세요</div>
      </div>
    </div>
    <div class="flash-overlay" id="flashOverlay"></div>
    <div class="cam-prompt" id="camPrompt">
      <div class="cam-prompt-icon">📷</div>
      <div class="cam-prompt-title">카메라 권한이 필요합니다</div>
      <div class="cam-prompt-sub">아래 버튼을 눌러 카메라를 시작해 주세요</div>
      <button class="cam-btn" onclick="startCamera()">카메라 시작하기</button>
    </div>
  </div>

  <!-- 하단: 패널 -->
  <div class="side-panel">

    <!-- 통계 + 수동 입력 -->
    <div class="panel-top">
      <div class="stat-big">
        <div class="stat-big-num" id="cntOk">0</div>
        <div class="stat-big-desc">✅ 출결 완료</div>
      </div>
      <div class="manual-input-area">
        <div class="manual-label">QR이 안 되면 사번 직접 입력</div>
        <div class="manual-row">
          <input class="manual-input" id="manualInput" type="text"
            inputmode="numeric" placeholder="사번 입력"
            maxlength="20" autocomplete="off" autocapitalize="off"
            onkeydown="if(event.key==='Enter') manualCheckin()">
          <button class="manual-btn" onclick="manualCheckin()">확인</button>
        </div>
      </div>
    </div>

    <!-- 출결 목록 -->
    <div class="result-list" id="resultList">
      <div class="result-empty" id="resultEmpty">스캔된 출결이 없습니다</div>
    </div>

    <!-- 피드백 바 -->
    <div class="feedback-bar idle" id="feedbackBar">
      <div class="fb-icon" id="fbIcon">📷</div>
      <div>
        <div class="fb-text" id="fbText">스캔 대기 중</div>
        <div class="fb-sub"  id="fbSub">QR코드를 카메라에 가까이 대주세요</div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jsqr/1.4.0/jsQR.min.js"></script>
<script>
  const API_URL = 'https://script.google.com/macros/s/AKfycbyns6C0iK7sE2hnSD4-H-uLYaW85DQvZDAIDh7rHYTUgjX030Zl22g5CMuvuXtZbulp/exec';

  let videoEl, canvasEl, ctx;
  let scanning = false, lastScanned = null, lastScannedTime = 0;
  let cntOk = 0;
  const COOLDOWN_MS = 3000;
  const MAX_SCAN_DIM = 640;

  // ── 소리 ─────────────────────────────────────────────
  let audioCtx = null;
  function getAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function beep(freq, dur, type, gain) {
    try {
      const ac = getAudio();
      const osc = ac.createOscillator();
      const g = ac.createGain();
      osc.connect(g); g.connect(ac.destination);
      osc.type = type; osc.frequency.value = freq;
      g.gain.setValueAtTime(gain, ac.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
      osc.start(ac.currentTime); osc.stop(ac.currentTime + dur);
    } catch(e) {}
  }
  function beepSuccess() { beep(880,0.09,'sine',0.4); setTimeout(()=>beep(1320,0.14,'sine',0.3),90); }
  function beepError()   { beep(200,0.28,'sawtooth',0.3); }

  // ── 카메라 ───────────────────────────────────────────
  async function startCamera() {
    document.getElementById('camPrompt').classList.add('hidden');
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      });
      videoEl = document.getElementById('video');
      videoEl.srcObject = stream;
      await videoEl.play();
      canvasEl = document.createElement('canvas');
      ctx = canvasEl.getContext('2d', { willReadFrequently: true });
      document.getElementById('statusDot').classList.add('active');
      document.getElementById('statusText').textContent = '카메라 작동 중';
      scanning = true;
      requestAnimationFrame(scanFrame);
    } catch(err) {
      document.getElementById('camPrompt').classList.remove('hidden');
      setFeedback('err', '❌', '카메라를 시작할 수 없습니다', '권한을 확인해 주세요');
    }
  }

  // ── 스캔 루프 ─────────────────────────────────────────
  function scanFrame() {
    if (!scanning) return;
    if (videoEl && videoEl.readyState === videoEl.HAVE_ENOUGH_DATA) {
      const vw = videoEl.videoWidth, vh = videoEl.videoHeight;
      const scale = Math.min(1, MAX_SCAN_DIM / Math.max(vw, vh));
      const sw = Math.floor(vw * scale), sh = Math.floor(vh * scale);
      canvasEl.width = sw; canvasEl.height = sh;
      ctx.drawImage(videoEl, 0, 0, sw, sh);
      const imgData = ctx.getImageData(0, 0, sw, sh);
      const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'attemptBoth' });
      if (code && code.data) {
        const now = Date.now();
        const raw = code.data.trim();
        if (raw && (raw !== lastScanned || now - lastScannedTime > COOLDOWN_MS)) {
          lastScanned = raw; lastScannedTime = now;
          handleScan(raw);
        }
      }
    }
    requestAnimationFrame(scanFrame);
  }

  // ── QR 스캔 처리 ─────────────────────────────────────
  async function handleScan(qrData) {
    const parts = qrData.split('|');
    const sano       = parts[0] || '';
    const courseName = parts[1] || '';
    const round      = parts[2] || '';
    flashScreen();
    await doCheckin(sano, courseName, round);
  }

  // ── 수동 입력 처리 ────────────────────────────────────
  async function manualCheckin() {
    const input = document.getElementById('manualInput');
    const sano = input.value.trim();
    if (!sano) { input.focus(); return; }
    input.value = '';
    await doCheckin(sano, '', '');
  }

  // ── 공통 출결 처리 ────────────────────────────────────
  async function doCheckin(sano, courseName, round) {
    setFeedback('idle', '⏳', `${sano} 처리 중...`, '잠시만 기다려 주세요');
    try {
      const res = await fetch(
        `${API_URL}?action=checkin` +
        `&sano=${encodeURIComponent(sano)}` +
        `&courseName=${encodeURIComponent(courseName)}` +
        `&round=${encodeURIComponent(round)}`
      );
      const json = await res.json();

      if (json.success) {
        const t    = json.timestamp ? String(json.timestamp).slice(11,16) : '';
        const name = json.name || '';
        const dept = json.dept || '';
        beepSuccess();
        cntOk++;
        document.getElementById('cntOk').textContent = cntOk;
        setFeedback('success', '✅', `${name || sano}  출결 완료`, t ? `기록 시각  ${t}` : '');
        addItem('success', '✅', name || sano, dept || sano, t);
      } else {
        // 중복이든 오류든 → 오류로 통일 표시 (중복 카드 없앰)
        beepError();
        const msg = json.alreadyCheckedIn
          ? `이미 출결됨${json.timestamp ? '  (' + String(json.timestamp).slice(11,16) + ')' : ''}`
          : (json.message || '출결 기록 실패');
        setFeedback('err', '⚠️', name_from(json, sano), msg);
        addItem('error', '⚠️', name_from(json, sano), msg, '');
      }
    } catch(e) {
      beepError();
      setFeedback('err', '❌', '서버 연결 오류', '네트워크를 확인해 주세요');
    }
    setTimeout(() => setFeedback('idle', '📷', '스캔 대기 중', 'QR코드를 카메라에 가까이 대주세요'), 3500);
  }

  function name_from(json, fallback) {
    return (json && json.name) ? json.name : fallback;
  }

  // ── UI 헬퍼 ───────────────────────────────────────────
  function flashScreen() {
    const el = document.getElementById('flashOverlay');
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 80);
  }

  function setFeedback(type, icon, text, sub) {
    const bar = document.getElementById('feedbackBar');
    bar.className = 'feedback-bar ' + (type === 'success' ? 'success' : type === 'err' ? 'err' : 'idle');
    document.getElementById('fbIcon').textContent = icon;
    document.getElementById('fbText').textContent = text;
    document.getElementById('fbSub').textContent  = sub || '';
  }

  function addItem(type, icon, name, sub, time) {
    const empty = document.getElementById('resultEmpty');
    if (empty) empty.remove();
    const list = document.getElementById('resultList');
    const now  = new Date();
    const t = time || `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
    const el = document.createElement('div');
    el.className = `result-item ${type}`;
    el.innerHTML = `
      <div class="ri-icon">${esc(icon)}</div>
      <div class="ri-info">
        <div class="ri-name">${esc(name)}</div>
        <div class="ri-sub">${esc(sub)}</div>
      </div>
      <div class="ri-time">${esc(t)}</div>`;
    list.insertBefore(el, list.firstChild);
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 초기화 ────────────────────────────────────────────
  window.addEventListener('load', () => {
    if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) startCamera();
    document.addEventListener('click', () => {
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }, { once: true });
  });
</script>
</body>
</html>
